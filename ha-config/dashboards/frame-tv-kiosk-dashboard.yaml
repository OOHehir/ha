# Frame TV Kiosk Dashboard — snapshot
#
# This is a snapshot of the live dashboard config, kept in source control
# for reference and recovery. The live config is stored in HA's .storage
# (storage-mode dashboard, url_path: frame-tv).
#
# To restore: paste frame-tv-dashboard-config.json into
# Settings > Dashboards > Frame TV > Raw configuration editor
#
# History note: this dashboard previously used the `wallpanel` HACS card
# for a Synology photo slideshow with a cards overlay. We dropped it on
# 2026-05-01 because of layout friction (see frame-tv-kiosk.md "Lessons
# learned"). It's now a plain sections-based dashboard rendered fullscreen
# by HAOSKiosk.

title: Frame TV
views:
  - title: Home
    type: sections
    max_columns: 4
    cards: []
    header:
      layout: center
      badges_position: top
      badges_wrap: wrap
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: markdown
            content: |
              # {{ now().strftime('%H:%M') }}
              ### {{ now().strftime('%A, %-d %B %Y') }}
          - type: weather-forecast
            entity: weather.forecast_home
            show_forecast: true
            forecast_type: daily

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: Energy
            show_header_toggle: false
            entities:
              - entity: sensor.myenergi_rlm_home_consumption
                name: Home consumption
              - entity: sensor.myenergi_rlm_power_grid
                name: Grid power
              - entity: sensor.myenergi_rlm_power_generation
                name: Solar generation
              - entity: sensor.myenergi_rlm_grid_import_today
                name: Grid import today
              - entity: sensor.myenergi_rlm_grid_export_today
                name: Grid export today
              - entity: sensor.myenergi_rlm_generated_today
                name: Generated today

      - type: grid
        cards:
          - type: heading
            heading: EV
          - type: entities
            title: EV Charger
            show_header_toggle: false
            entities:
              - entity: sensor.myenergi_zappi_17004798_status
                name: Zappi status
              - entity: select.myenergi_zappi_17004798_charge_mode
                name: Charge mode
              - entity: sensor.myenergi_zappi_17004798_plug_status
                name: Plug status
              - entity: sensor.myenergi_zappi_17004798_charge_added_session
                name: Charge added
              - entity: sensor.myenergi_zappi_17004798_energy_used_today
                name: Energy used today
          # SOC scaled by hardcoded SOH factor (0.807) to match the in-car
          # dashboard reading. OBD reports % of original capacity; the car's
          # display shows % of current (degraded) capacity. Re-tune the
          # factor every few months as the battery ages further.
          - type: markdown
            content: |
              ### Leaf battery

              ## {{ ((states('sensor.nissan_leaf_obd_ble_state_of_charge') | float(0)) / 0.807) | round(0) }}%

              Raw OBD: {{ states('sensor.nissan_leaf_obd_ble_state_of_charge') | float(0) | round(1) }}%
              Updated {{ relative_time(states.sensor.nissan_leaf_obd_ble_state_of_charge.last_updated) }} ago
            grid_options:
              columns: 12
              rows: 3

      - type: grid
        cards:
          - type: heading
            heading: Solar
          - type: custom:apexcharts-card
            header:
              show: true
              title: Solar forecast - today (kW)
              show_states: true
              colorize_states: true
            graph_span: 24h
            span:
              start: day
            yaxis:
              - min: 0
                apex_config:
                  title:
                    text: kW
            series:
              - entity: sensor.solcast_pv_forecast_forecast_today
                name: Forecast
                type: column
                color: "#FFC107"
                data_generator: |
                  return entity.attributes.detailedHourly.map(e =>
                    [new Date(e.period_start).getTime(), e.pv_estimate]);
              - entity: sensor.solcast_pv_forecast_forecast_today
                name: 10th pct
                type: line
                color: "#F44336"
                stroke_width: 1
                data_generator: |
                  return entity.attributes.detailedHourly.map(e =>
                    [new Date(e.period_start).getTime(), e.pv_estimate10]);
              - entity: sensor.solcast_pv_forecast_forecast_today
                name: 90th pct
                type: line
                color: "#4CAF50"
                stroke_width: 1
                data_generator: |
                  return entity.attributes.detailedHourly.map(e =>
                    [new Date(e.period_start).getTime(), e.pv_estimate90]);
